
spring:
    application:
        name: auth
    datasource:
        url: ${DB_URL}
        driverClassName: ${DB_DRIVER}
        password: ${DB_PASSWORD}
        username: ${DB_USERNAME}
    jpa:
        database-platform: ${DB_PLATFORM}
        hibernate:
            ddl-auto: create-drop
    rabbitmq:
        host: ${RABBITMQ_HOST}
        port: ${RABBITMQ_PORT}
        username: ${RABBITMQ_USERNAME}
        password: ${RABBITMQ_PASSWORD}

server:
    port: 3000

security:
    jwt:
        user:
            public-key: ${USER_JWT_PUBLIC_KEY}
            private-key: ${USER_JWT_PRIVATE_KEY}
            expiration: ${USER_JWT_EXPIRATION_TIME}
        internal:
            public-key: ${INTERNAL_JWT_PUBLIC_KEY}
            expiration: ${INTERNAL_JWT_EXPIRATION_TIME}
        algorithm: ${JWT_ALG}

spring:
    application:
        name: gateway
    datasource:
        url: jdbc:h2:mem:mydb
        driverClassName: org.h2.Driver
        username: sa
        password: password
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: create-drop
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest

server:
    port: 3001

security:
    jwt:
        user:
            public-key: ${USER_JWT_PUBLIC_KEY}
            expiration: ${USER_JWT_EXPIRATION_TIME}
        internal:
            public-key: ${INTERNAL_JWT_PUBLIC_KEY}
            private-key: ${INTERNAL_JWT_PRIVATE_KEY}
            expiration: ${INTERNAL_JWT_EXPIRATION_TIME}
        algorithm: RS256
        expiration-time: 900000